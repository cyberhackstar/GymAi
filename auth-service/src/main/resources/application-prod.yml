spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  web:
    cors:
      allowed-origins:
        - "https://gymai.neelahouse.cloud"
        - "https://gymaibybhawesh.netlify.app"
        - "https://gymaibybhawesh.vercel.app"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

  rabbitmq:
    addresses: ${CLOUDAMQP_URL}
    ssl:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [email, profile]
            redirect-uri: ${REDIRECT_URI:"https://auth-service-gymai.neelahouse.cloud/login/oauth2/code/{registrationId}"}
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: [user:email, read:user]
            redirect-uri: ${REDIRECT_URI:"https://auth-service-gymai.neelahouse.cloud/login/oauth2/code/{registrationId}"}

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

logging:
  file:
    name: /var/log/gymai/auth-service.log
  level:
    root: WARN
    com.gymai.auth_service: INFO
