server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: plan-service
  profiles:
    active: dev   # default profile (can be overridden by ENV var)

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_ACCESS_EXPIRATION}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8082}
  ai:
    url: ${AI_SERVICE_URL:http://localhost:8000}

logging:
  file:
    name: logs/plan-service.log
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gymai.plan_service: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web.client.RestTemplate: ${LOG_LEVEL_REST:DEBUG}
    org.springframework.http: ${LOG_LEVEL_HTTP:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.data.redis: ${LOG_LEVEL_REDIS:INFO}
    io.lettuce.core: WARN

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origins:
          - ${FRONTEND_URL:http://localhost:4200}
          - ${ADMIN_URL:http://localhost:3000}
        allowed-methods: "*"
        allowed-headers: "*"
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  health:
    redis:
      enabled: true

cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:4200}
    - ${ADMIN_URL:http://localhost:3000}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true

app:
  features:
    cache-enabled: ${CACHE_ENABLED:true}
    ai-integration-enabled: ${AI_INTEGRATION_ENABLED:true}
    external-apis-enabled: ${EXTERNAL_APIS_ENABLED:true}
  limits:
    max-plan-regenerations-per-day: ${MAX_PLAN_REGENERATIONS:5}
    max-users-per-batch: ${MAX_USERS_PER_BATCH:100}
  environment: ${APP_ENVIRONMENT:development}

cache:
  redis:
    enabled: ${CACHE_ENABLED:true}
    ttl:
      user-profile: ${CACHE_TTL_USER_PROFILE:3600}
      diet-plan: ${CACHE_TTL_DIET_PLAN:86400}
      workout-plan: ${CACHE_TTL_WORKOUT_PLAN:86400}
      nutrition-analysis: ${CACHE_TTL_NUTRITION:3600}
      plans-response: ${CACHE_TTL_PLANS_RESPONSE:7200}
      foods-by-preference: ${CACHE_TTL_FOODS:21600}
      exercises-by-focus: ${CACHE_TTL_EXERCISES:21600}
    key-prefix: ${CACHE_KEY_PREFIX:fitness:}
    fallback:
      enabled: true
      log-errors: true
