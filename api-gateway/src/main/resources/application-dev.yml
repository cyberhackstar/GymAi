server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        # Auth Service - Development
        - id: auth-service-dev
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
        
        # User Service - Development  
        - id: user-service-dev
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
        
        # Plan Service - Development
        - id: plan-service-dev
          uri: http://localhost:8083
          predicates:
            - Path=/api/plans/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter
        
        # Notification Service - Development
        - id: notification-service-dev
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

  redis:
    host: localhost
    port: 6379
    password: 
    timeout: 2000ms

# Development JWT settings
jwt:
  secret: devSecretKeyForTesting123456789
  access-expiration: 3600000  # 1 hour
  refresh-expiration: 86400000  # 24 hours

# Logging for development
logging:
  level:
    com.gym.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Circuit breaker settings for development
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s

# Rate limiting - more lenient for development
rate-limiting:
  default-rate: 1000
  default-capacity: 2000
  auth-rate: 50
  auth-capacity: 100